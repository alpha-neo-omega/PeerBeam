name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt · clippy · test · examples)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Examples compile
        run: cargo build --examples

  flutter:
    name: Flutter (analyze · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  # Cross-platform proof: the Rust engine and the desktop app must build (and
  # the engine's tests pass) on every desktop OS. Intel macOS is covered from
  # the Apple Silicon runner: x86_64 tests execute under Rosetta 2 (real
  # Intel-arch binaries) and the Flutter app builds universal — GitHub's
  # Intel (macos-13) runners are deprecated and queue-starved.
  desktop:
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            build: flutter build windows --release
          - os: macos-latest
            label: macos-arm64+x64
            build: flutter build macos --release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Rust tests
        working-directory: rust
        shell: bash
        # On failure, surface the failing tests/panics as annotations so the
        # cause is visible without downloading runner logs.
        run: |
          set -o pipefail
          if ! cargo test --workspace --no-fail-fast 2>&1 | tee /tmp/test-out.txt; then
            grep -E "^(test .+ \.\.\. FAILED|---- .+ ----|thread .+ panicked.*|error(\[[^]]+\])?:.*)" /tmp/test-out.txt \
              | head -40 | while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          fi
      - name: Rust tests (x86_64 under Rosetta)
        if: runner.os == 'macOS'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          rustup target add x86_64-apple-darwin
          if ! cargo test --workspace --no-fail-fast --target x86_64-apple-darwin 2>&1 | tee /tmp/test-x64.txt; then
            grep -E "^(test .+ \.\.\. FAILED|---- .+ ----|thread .+ panicked.*|error(\[[^]]+\])?:.*)" /tmp/test-x64.txt \
              | head -40 | while IFS= read -r line; do echo "::error::x86_64: ${line}"; done
            exit 1
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get
      - name: Build desktop app
        working-directory: flutter
        run: ${{ matrix.build }}
      - name: Verify universal mac binary (arm64 + x86_64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN=$(find flutter/build/macos -name peerbeam -type f -path "*MacOS*" | head -1)
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q x86_64 || { echo "::error::mac app is not universal"; exit 1; }
