name: release
# Build production artifacts for every platform on a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev dpkg-dev rpm librsvg2-bin
      - run: flutter config --enable-linux-desktop && (cd flutter && flutter pub get)
      - run: bash scripts/package-linux.sh
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  windows:
    runs-on: windows-latest
    # Needs signing secrets; don't block the release if they're absent.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter config --enable-windows-desktop; cd flutter; flutter pub get
      - name: Package (MSIX)
        env:
          PB_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          PB_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: powershell -File scripts/package-windows.ps1
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: flutter/build/windows/x64/runner/Release/*.msix }

  macos:
    runs-on: macos-latest
    # Needs signing/notarization secrets; don't block the release if absent.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter config --enable-macos-desktop && (cd flutter && flutter pub get)
      - name: Package (DMG, sign + notarize)
        env:
          PB_SIGN_ID: ${{ secrets.MACOS_SIGN_ID }}
          PB_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          PB_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
        run: bash scripts/package-macos.sh
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/*.dmg }

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: cd flutter && flutter pub get
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > flutter/android/peerbeam-release.jks
            printf '%s' "$KEY_PROPERTIES" > flutter/android/key.properties
          fi
      - run: bash scripts/package-android.sh
      - uses: actions/upload-artifact@v4
        with: { name: android, path: dist/* }

  # Publish the GitHub Release once the no-secret builds (Linux + Android) are
  # done. macOS/Windows are not required — they only produce extra assets when
  # their signing secrets are configured. Uses the built-in GITHUB_TOKEN.
  release:
    needs: [linux, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE_NOTES_v0.2.0.md
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/linux/*
            artifacts/android/*
            artifacts/windows/*
            artifacts/macos/*
