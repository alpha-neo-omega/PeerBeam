name: release
# Build production artifacts for every platform on a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev dpkg-dev rpm librsvg2-bin
      - run: flutter config --enable-linux-desktop && (cd flutter && flutter pub get)
      - run: bash scripts/package-linux.sh
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  windows:
    runs-on: windows-latest
    # Needs signing secrets; don't block the release if they're absent.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter config --enable-windows-desktop; cd flutter; flutter pub get
      - name: Package (MSIX)
        env:
          PB_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          PB_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: powershell -File scripts/package-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            flutter/build/windows/x64/runner/Release/*.msix
            dist/*.zip

  macos:
    runs-on: macos-latest
    # Needs signing/notarization secrets; don't block the release if absent.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter config --enable-macos-desktop && (cd flutter && flutter pub get)
      - name: Package (DMG, sign + notarize)
        env:
          PB_SIGN_ID: ${{ secrets.MACOS_SIGN_ID }}
          PB_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          PB_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
        run: bash scripts/package-macos.sh
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/*.dmg }

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: cd flutter && flutter pub get
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > flutter/android/peerbeam-release.jks
            printf '%s' "$KEY_PROPERTIES" > flutter/android/key.properties
          fi
      - run: bash scripts/package-android.sh
      - uses: actions/upload-artifact@v4
        with: { name: android, path: dist/* }

  # Standalone CLI binaries — pure cargo, no Flutter/signing, so they build fast
  # and reliably for every desktop OS. The release waits on these (unlike the
  # signed GUI jobs) so the CLI ships on every platform.
  cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --manifest-path rust/Cargo.toml --release -p peerbeam-cli
      - name: Stage CLI + shell completions
        run: |
          mkdir -p out
          cp rust/target/release/peerbeam out/peerbeam-linux-x64
          rust/target/release/peerbeam completions bash > out/peerbeam.bash
          rust/target/release/peerbeam completions zsh  > out/_peerbeam
          rust/target/release/peerbeam completions fish > out/peerbeam.fish
      - uses: actions/upload-artifact@v4
        with: { name: cli-linux, path: out/* }

  cli-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --manifest-path rust/Cargo.toml --release -p peerbeam-cli
      - run: mkdir -p out && cp rust/target/release/peerbeam out/peerbeam-macos-arm64
      - uses: actions/upload-artifact@v4
        with: { name: cli-macos, path: out/* }

  cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --manifest-path rust/Cargo.toml --release -p peerbeam-cli
      - name: Stage CLI
        run: |
          New-Item -ItemType Directory -Force -Path out
          Copy-Item rust\target\release\peerbeam.exe out\peerbeam-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with: { name: cli-windows, path: out/* }

  # Publish the GitHub Release. Requires the no-secret builds (Linux GUI +
  # Android + the three CLI jobs). Unsigned GUI artifacts (Linux tar/deb, Windows
  # portable zip, macOS universal DMG) ARE attached; the signed variants
  # (notarized DMG / signed MSIX) await their signing secrets. Uses the built-in
  # GITHUB_TOKEN.
  release:
    needs: [linux, windows, android, cli-linux, cli-macos, cli-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      # A re-pushed tag reruns this job against an existing release. Patching
      # that object in place proved flaky (stale asset names linger; uploads
      # against it hit 'Too many retries'), so drop it and publish fresh — the
      # next step recreates it from the tag.
      - name: Remove existing release (tag re-runs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$GITHUB_REF_NAME" -y --repo "$GITHUB_REPOSITORY" \
            || echo "no existing release for $GITHUB_REF_NAME"
      # Plain `gh` instead of an action: upload errors are visible in the log
      # (softprops died twice with an opaque 'Too many retries').
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          # Top-level files only: artifact dirs also carry build-debris
          # subtrees (e.g. the deb staging tree), whose contents collide on
          # basename (gh names assets by basename -> 422 duplicate).
          mapfile -t files < <(find artifacts/linux artifacts/android \
            artifacts/cli-linux artifacts/cli-macos artifacts/cli-windows \
            -maxdepth 1 -type f 2>/dev/null)
          # Windows GUI ships as the portable zip only (MSIX awaits signing).
          # The windows artifact preserves subdirs (multi-path upload), so
          # search at any depth; the basename is unique.
          mapfile -t -O "${#files[@]}" files < <(find artifacts/windows \
            -type f -name '*.zip' 2>/dev/null)
          # macOS GUI ships as the unsigned/un-notarized universal DMG (runs on
          # Intel + Apple Silicon); the notarized DMG awaits signing secrets.
          mapfile -t -O "${#files[@]}" files < <(find artifacts/macos \
            -maxdepth 1 -type f -name '*.dmg' 2>/dev/null)
          printf 'upload: %s\n' "${files[@]}"
          if ! gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --prerelease --verify-tag \
            --notes-file "docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md" \
            "${files[@]}" 2> /tmp/gh-err.txt; then
            # Surface the real error as annotations (readable without log auth).
            while IFS= read -r line; do echo "::error::gh: ${line}"; done < /tmp/gh-err.txt
            exit 1
          fi
